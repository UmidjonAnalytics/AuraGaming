<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Kassa — O'yin klubi</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0E1116" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<style>
  :root{
    --bg:#0E1116; --surface:#161B22; --surface2:#1E2530; --line:#2A323F;
    --text:#E7ECF3; --muted:#8A94A3; --faint:#5A6472;
    --accent:#7C5CFF; --accent-press:#6A49F2;
    --cash:#34D399; --cash-dim:#123a2e;
    --card:#38BDF8; --card-dim:#0f2f44;
    --danger:#F87171; --warn:#FBBF24; --ok:#34D399;
    --radius:16px; --tap:56px;
    --num:"JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{background:var(--bg); color:var(--text);
    font-family:"Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size:16px; line-height:1.4; overscroll-behavior:none;}
  #app{max-width:520px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; position:relative;
    background:var(--bg); box-shadow:0 0 60px rgba(0,0,0,.5)}
  .num{font-family:var(--num); font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  button{font-family:inherit; cursor:pointer; border:none; color:inherit}
  input,select{font-family:inherit; font-size:16px}
  .hidden{display:none !important}

  #login{flex:1; display:flex; flex-direction:column; justify-content:center; padding:32px 24px; gap:18px}
  #login .brand{font-size:34px; font-weight:800; letter-spacing:-.03em}
  #login .brand span{color:var(--accent)}
  #login .logo{width:132px;height:auto;display:block;margin:0 auto 4px;filter:drop-shadow(0 6px 18px rgba(56,189,248,.25))}
  header .hlogo{width:34px;height:34px;object-fit:contain;flex:0 0 auto}
  header .htitle-wrap{display:flex;align-items:center;gap:10px}
  #login p.sub{color:var(--muted); margin:-8px 0 12px}
  .field{display:flex; flex-direction:column; gap:6px}
  .field label{font-size:13px; color:var(--muted); font-weight:600}
  .field input{background:var(--surface2); border:1px solid var(--line); color:var(--text);
    padding:14px 16px; border-radius:12px; min-height:var(--tap)}
  .field input:focus{outline:none; border-color:var(--accent)}
  .btn{background:var(--accent); color:#fff; font-weight:700; padding:16px; border-radius:14px;
    min-height:var(--tap); font-size:17px; transition:transform .05s, background .15s}
  .btn:active{transform:scale(.98); background:var(--accent-press)}
  .btn.ghost{background:var(--surface2); color:var(--text); border:1px solid var(--line)}
  .btn.danger{background:var(--danger)}
  .btn.block{width:100%}
  .err{color:var(--danger); font-size:14px; min-height:18px}

  header{padding:16px 18px 8px; display:flex; align-items:center; justify-content:space-between; gap:10px}
  header .htitle{font-size:22px; font-weight:800; letter-spacing:-.02em}
  header .who{font-size:12px; color:var(--muted); text-align:right}
  header .who b{color:var(--text); display:block; font-size:13px}
  .icon-btn{width:44px; height:44px; border-radius:12px; background:var(--surface2); border:1px solid var(--line);
    display:grid; place-items:center; flex:0 0 auto}
  .icon-btn svg{width:22px; height:22px; stroke:var(--text); fill:none; stroke-width:1.8}
  .sync{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 9px;border-radius:20px;
    background:var(--surface2);border:1px solid var(--line);color:var(--muted)}
  .sync .d{width:7px;height:7px;border-radius:50%;background:var(--ok)}
  .sync.pending .d{background:var(--warn)} .sync.off .d{background:var(--danger)}
  .sync.pending{color:var(--warn)} .sync.off{color:var(--danger)}

  main{flex:1; overflow-y:auto; padding:6px 16px 96px; -webkit-overflow-scrolling:touch}
  .section-label{font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint);
    font-weight:700; margin:18px 4px 8px}

  .balances{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .bal{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px 16px 18px;
    position:relative; overflow:hidden; text-align:left; display:flex; flex-direction:column; gap:8px}
  .bal:active{border-color:var(--accent)}
  .bal .lbl{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); font-weight:600}
  .bal .dot{width:9px; height:9px; border-radius:50%}
  .bal.cash .dot{background:var(--cash)} .bal.card .dot{background:var(--card)}
  .bal .amt{font-size:26px; font-weight:800}
  .bal.cash .amt{color:var(--cash)} .bal.card .amt{color:var(--card)}
  .bal .cur{font-size:13px; color:var(--faint); font-weight:600; margin-top:-2px}
  .bal .tap{position:absolute; top:14px; right:14px; font-size:11px; color:var(--faint)}

  .panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-top:14px}
  .panel h3{margin:0 0 12px; font-size:15px; font-weight:700}
  .bigamt{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text);
    border-radius:12px; padding:18px 16px; font-size:28px; font-weight:800; text-align:right; min-height:64px}
  .bigamt:focus{outline:none; border-color:var(--accent)}
  .row{display:flex; gap:10px; align-items:center}
  .row.mt{margin-top:12px}
  .seg{display:flex; gap:8px}
  .seg .opt{flex:1; background:var(--surface2); border:1px solid var(--line); border-radius:12px; padding:12px;
    display:flex; flex-direction:column; align-items:center; gap:4px; min-height:var(--tap); justify-content:center; color:var(--muted)}
  .seg .opt svg{width:26px; height:26px; stroke-width:1.7; fill:none; stroke:currentColor}
  .seg .opt.on.cash{border-color:var(--cash); color:var(--cash); background:var(--cash-dim)}
  .seg .opt.on.card{border-color:var(--card); color:var(--card); background:var(--card-dim)}
  .seg .opt span{font-size:11px; font-weight:700}
  .datepick{flex:1; background:var(--surface2); border:1px solid var(--line); color:var(--text);
    border-radius:12px; padding:0 14px; min-height:var(--tap); display:flex; align-items:center; gap:10px}
  .datepick svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.8; flex:0 0 auto}
  .datepick input{background:transparent; border:none; color:var(--text); width:100%; padding:14px 0}
  .datepick input:focus{outline:none}

  .plus-row{display:flex; align-items:center; justify-content:space-between; margin-top:6px}
  .plus-btn{display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px dashed var(--line);
    color:var(--text); padding:12px 16px; border-radius:12px; font-weight:700; min-height:var(--tap)}
  .plus-btn svg{width:20px;height:20px;stroke:var(--accent);stroke-width:2.2;fill:none}
  .list{display:flex; flex-direction:column; gap:8px; margin-top:10px}
  .lrow{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:10px 12px}
  .lrow .thumb{width:44px; height:44px; border-radius:10px; background:var(--surface2); object-fit:cover; flex:0 0 auto;
    display:grid; place-items:center; color:var(--faint); font-size:11px; overflow:hidden}
  .lrow .meta{flex:1; min-width:0; text-align:left}
  .lrow .meta .nm{font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .lrow .meta .sub{font-size:12px; color:var(--muted)}
  .lrow .qty{font-weight:800; font-size:17px}
  .lrow .qty.low{color:var(--warn)}
  .stepper{display:flex; align-items:center; gap:6px}
  .stepper button{width:38px;height:38px;border-radius:10px;background:var(--surface2);border:1px solid var(--line);
    font-size:22px;font-weight:700;display:grid;place-items:center;color:var(--text)}
  .stepper .n{min-width:30px;text-align:center;font-weight:800}
  .empty{color:var(--faint); text-align:center; padding:28px 10px; font-size:14px}

  .debt-top{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .debt-top .bal .amt{color:var(--warn)}
  .debt-top .bal.pc .dot{background:var(--accent)} .debt-top .bal.bar .dot{background:var(--warn)}
  .total-owed{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:12px;
    display:flex; align-items:center; justify-content:space-between}
  .total-owed .t{font-size:13px;color:var(--muted);font-weight:600}
  .total-owed .v{font-size:24px;font-weight:800;color:var(--warn)}

  .menu{display:flex; flex-direction:column; gap:10px; margin-top:10px}
  .menu button{display:flex; align-items:center; gap:14px; background:var(--surface); border:1px solid var(--line);
    border-radius:14px; padding:16px; text-align:left; min-height:var(--tap)}
  .menu button:active{border-color:var(--accent)}
  .menu .mi{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:grid;place-items:center;flex:0 0 auto}
  .menu .mi svg{width:22px;height:22px;stroke:var(--accent);fill:none;stroke-width:1.8}
  .menu .mt{flex:1}
  .menu .mt b{display:block;font-size:15px}
  .menu .mt span{font-size:12px;color:var(--muted)}
  .menu .chev svg{width:20px;height:20px;stroke:var(--faint);fill:none;stroke-width:2}

  .fab{position:absolute; right:18px; bottom:88px; width:60px; height:60px; border-radius:50%;
    background:var(--accent); display:grid; place-items:center; box-shadow:0 8px 24px rgba(124,92,255,.4); z-index:20}
  .fab svg{width:28px;height:28px;stroke:#fff;stroke-width:2.4;fill:none}
  .fab.scan{background:var(--card); box-shadow:0 8px 24px rgba(56,189,248,.35)}
  .fab.pay{background:var(--ok); box-shadow:0 8px 24px rgba(52,211,153,.35)}
  .fab-group{position:absolute; right:18px; bottom:88px; display:flex; flex-direction:column; gap:12px; align-items:center; z-index:20}
  .fab-group .fab{position:static}

  nav{position:sticky; bottom:0; left:0; right:0; background:rgba(14,17,22,.92); backdrop-filter:blur(12px);
    border-top:1px solid var(--line); display:flex; padding:8px 6px calc(8px + env(safe-area-inset-bottom));}
  nav button{flex:1; background:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px; color:var(--muted)}
  nav button svg{width:24px;height:24px;stroke-width:1.8;fill:none;stroke:currentColor}
  nav button span{font-size:11px; font-weight:600}
  nav button.on{color:var(--accent)}

  .scrim{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50; display:flex; align-items:flex-end; justify-content:center}
  .sheet{background:var(--surface); width:100%; max-width:520px; border-radius:22px 22px 0 0; border:1px solid var(--line);
    max-height:92vh; overflow-y:auto; padding:8px 18px calc(20px + env(safe-area-inset-bottom)); animation:up .22s ease}
  @keyframes up{from{transform:translateY(100%)} to{transform:translateY(0)}}
  .grab{width:40px;height:4px;background:var(--line);border-radius:3px;margin:8px auto 12px}
  .sheet h2{margin:0 0 4px; font-size:20px; font-weight:800}
  .sheet .desc{color:var(--muted); font-size:13px; margin:0 0 14px}
  .sheet .field{margin-bottom:12px}
  .sheet .actions{display:flex; gap:10px; margin-top:16px}
  .sheet .actions .btn{flex:1}
  select.inp, input.inp{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text);
    padding:14px 16px; border-radius:12px; min-height:var(--tap)}
  select.inp:focus, input.inp:focus{outline:none;border-color:var(--accent)}

  .cam-wrap{position:relative; width:100%; background:#000; border-radius:14px; overflow:hidden; margin-bottom:12px;
    display:grid; place-items:center}
  .cam-wrap.barcode{aspect-ratio:16/7}
  .cam-wrap video{width:100%; height:100%; object-fit:cover; display:block}
  .cam-guide{position:absolute; inset:14% 8%; border:2px solid rgba(124,92,255,.9); border-radius:10px; pointer-events:none}
  .cam-msg{padding:16px; text-align:center; color:var(--muted); font-size:13px; line-height:1.5}
  .scan-feed{font-size:12px;color:var(--card);min-height:16px;margin-bottom:8px;font-weight:600}

  .money-note{font-size:12px;color:var(--faint);text-align:center;margin-top:8px}
  .transp{opacity:.5}
  .toast{position:fixed; left:50%; bottom:104px; transform:translateX(-50%); background:var(--surface2);
    border:1px solid var(--line); color:var(--text); padding:12px 18px; border-radius:12px; z-index:80; font-size:14px;
    box-shadow:0 8px 24px rgba(0,0,0,.4); font-weight:600; max-width:90%; text-align:center}
  .banner{background:var(--surface2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; font-size:12px;
    color:var(--muted); margin:12px 0}
  .kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .kv:last-child{border-bottom:none}
  .kv b{font-weight:800}
  .install{display:flex;align-items:center;gap:10px;width:100%;background:var(--surface2);border:1px solid var(--accent);
    color:var(--text);border-radius:12px;padding:12px 14px;font-weight:700;font-size:14px;margin-top:10px}
  .install svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2;flex:0 0 auto}
  .install small{display:block;font-weight:500;color:var(--muted);font-size:11px}
  .bal.span2{grid-column:1 / -1}
  .bal.debt .dot{background:var(--warn)} .bal.debt .amt{color:var(--warn)}
  .bal.total .dot{background:var(--faint)} .bal.total .amt{color:var(--text)}
  .scan-tile{display:flex;align-items:center;gap:14px;width:100%;background:var(--card-dim);border:1px solid var(--card);
    border-radius:var(--radius);padding:16px;margin-top:14px;text-align:left}
  .scan-tile:active{transform:scale(.99)}
  .scan-tile .ic{width:50px;height:50px;border-radius:12px;background:var(--card);display:grid;place-items:center;flex:0 0 auto}
  .scan-tile .ic svg{width:28px;height:28px;stroke:#04222f;stroke-width:2.3;fill:none}
  .scan-tile b{font-size:16px} .scan-tile span{font-size:12px;color:var(--muted);display:block}
  .paydebt-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--ok);color:#04231a;
    font-weight:800;border-radius:14px;padding:15px;min-height:var(--tap);margin-top:12px}
  .paydebt-btn svg{width:22px;height:22px;stroke:#04231a;stroke-width:2.3;fill:none}
  .method3 .opt.on.debt{border-color:var(--warn);color:var(--warn);background:#332707}
</style>

<body>
<div id="app"></div>

<script>
/* =====================================================================
   KASSA — o'yin klubi (v2)
   Menyular: PC, Bar (foydalanuvchi) + Sozlamalar (admin).
   Qarz — PC'da to'lov usuli (Naqd/Karta/Qarz). Bar faqat Naqd/Karta.
   Amallar umumiy jurnalga qo'shiladi (ko'p qurilma xavfsiz).
   ===================================================================== */

const CONFIG = {
  BUSINESS_DAY_CUTOFF_HOUR: 6,
  LOW_STOCK: 3,
  CURRENCY: "so'm",
  SHEETS_API_URL: '',
  POLL_MS: 4000
};
const online = ()=> !!CONFIG.SHEETS_API_URL;

const mem={};
const LS={ get(k){try{return localStorage.getItem(k);}catch(e){return mem[k]??null;}},
           set(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}} };
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,9); }

let OPS=JSON.parse(LS.get('kassa_ops')||'[]');
let PENDING=JSON.parse(LS.get('kassa_pending')||'[]');
let SYNC='ok', ST=null;
function persist(){ LS.set('kassa_ops',JSON.stringify(OPS)); LS.set('kassa_pending',JSON.stringify(PENDING)); }
function lastSeq(){ return OPS.length?OPS[OPS.length-1].seq:0; }
function pushOp(type,p){
  PENDING.push({uid:uid(),ts:Date.now(),user:CURRENT?CURRENT.username:'-',type,p});
  persist(); rebuild(); render(); sync();
}

/* ---------- holatni jurnaldan qayta hisoblash ---------- */
function rebuild(){
  const st={ users:[{username:'admin',password:'admin',role:'admin'}],
    reasons:["Ijara","Oylik","Xarid","Kommunal"],
    products:[], ledger:[], sales:[], debtGiven:[], debtPaid:[] };
  const P=b=>st.products.find(x=>x.barcode===b);
  for(const op of [...OPS,...PENDING]){
    const p=op.p||{}, by=op.user, ts=op.ts;
    switch(op.type){
      case 'user_add':{ const i=st.users.findIndex(u=>u.username===p.username);
        if(i>=0) st.users[i]={username:p.username,password:p.password,role:p.role};
        else st.users.push({username:p.username,password:p.password,role:p.role}); break; }
      case 'user_del': st.users=st.users.filter(u=>u.username!==p.username); break;
      case 'reason_add': if(!st.reasons.includes(p.reason)) st.reasons.push(p.reason); break;

      case 'money':          // {safe,method('cash'|'card'|'debt'),dir,amount,date,reason,name}
        if(p.method==='debt') st.debtGiven.push({name:p.name||'',amount:p.amount,date:p.date,by,ts});
        else st.ledger.push({safe:p.safe,method:p.method,dir:p.dir,amount:p.amount,date:p.date,reason:p.reason||'',by,ts});
        break;
      case 'debt_pay':       // {name,amount,method,date}
        st.debtPaid.push({name:p.name||'',amount:p.amount,method:p.method,date:p.date,by,ts});
        st.ledger.push({safe:'PC',method:p.method,dir:'in',amount:p.amount,date:p.date,reason:"Qarz to'lovi",by,ts});
        break;

      case 'prod_new': if(!P(p.barcode)) st.products.push({barcode:p.barcode,name:p.name,photo:p.photo||'',price:p.price||0,qty:0}); break;
      case 'stock_in':{ const x=P(p.barcode); if(x)x.qty+=p.qty; break; }
      case 'price':{ const x=P(p.barcode); if(x)x.price=p.price; break; }
      case 'stock_set': (p.counts||[]).forEach(c=>{ const x=P(c.barcode); if(x)x.qty=c.qty; }); break;

      case 'sale':
        st.sales.push({date:p.date,method:p.method,total:p.total,items:p.items||[],by,ts});
        (p.items||[]).forEach(it=>{ const x=P(it.barcode); if(x)x.qty-=it.qty; });
        st.ledger.push({safe:'BAR',method:p.method,dir:'in',amount:p.total,date:p.date,reason:'Sotuv',by,ts});
        break;
    }
  }
  ST=st;
  if(CURRENT){ CURRENT=ST.users.find(x=>x.username===CURRENT.username)||null; }
}

/* ---------- sinxronlash ---------- */
let syncing=false;
async function sync(){
  if(!online()||syncing) return; syncing=true;
  const sending=PENDING.slice();
  try{
    const res=await fetch(CONFIG.SHEETS_API_URL,{method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({since:lastSeq(),ops:sending})});
    const j=await res.json();
    if(!j.ok) throw new Error(j.error||'server');
    if(j.ops&&j.ops.length){ const have=new Set(OPS.map(o=>o.seq));
      j.ops.forEach(o=>{ if(!have.has(o.seq)) OPS.push(o); }); OPS.sort((a,b)=>a.seq-b.seq); }
    const done=new Set(OPS.map(o=>o.uid)); PENDING=PENDING.filter(o=>!done.has(o.uid));
    SYNC='ok'; persist(); rebuild(); softRender();
  }catch(e){ SYNC='off'; softRender(); }
  finally{ syncing=false; }
}
function softRender(){
  const modal=document.getElementById('scrim')||document.getElementById('scanScrim');
  const typing=document.activeElement&&['INPUT','SELECT'].includes(document.activeElement.tagName);
  if(modal||typing){ updateSyncBadge(); return; } render();
}
setInterval(()=>{ if(CURRENT) sync(); },CONFIG.POLL_MS);
window.addEventListener('online',sync);

/* ---------- pul / sana ---------- */
function money(n){ n=Math.round(n||0);
  const s=Math.abs(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g," "); return (n<0?'-':'')+s; }
function businessDay(d){ const x=d?new Date(d):new Date();
  if(x.getHours()<CONFIG.BUSINESS_DAY_CUTOFF_HOUR) x.setDate(x.getDate()-1);
  const p=n=>String(n).padStart(2,'0'); return x.getFullYear()+'-'+p(x.getMonth()+1)+'-'+p(x.getDate()); }
const todayBiz=()=>businessDay();
const prettyDate=iso=>{const[a,b,c]=iso.split('-');return c+'/'+b+'/'+a;};
const MONTHS_UZ=["Yanvar","Fevral","Mart","Aprel","May","Iyun","Iyul","Avgust","Sentabr","Oktabr","Noyabr","Dekabr"];

function balance(safe,method){ let s=0;
  ST.ledger.forEach(e=>{ if(e.safe===safe&&e.method===method) s+=(e.dir==='in'?e.amount:-e.amount); }); return s; }
function debtOutstanding(){ let g=0,p=0;
  ST.debtGiven.forEach(d=>g+=d.amount); ST.debtPaid.forEach(d=>p+=d.amount); return g-p; }
function perPersonDebt(){
  const m={};
  const key=n=>n&&n.trim()?n.trim():"Noma'lum";
  ST.debtGiven.forEach(d=>{ const k=key(d.name); (m[k]=m[k]||{name:k,given:0,paid:0,rows:[]});
    m[k].given+=d.amount; m[k].rows.push({date:d.date,type:'in',amount:d.amount,by:d.by}); });
  ST.debtPaid.forEach(d=>{ const k=key(d.name); (m[k]=m[k]||{name:k,given:0,paid:0,rows:[]});
    m[k].paid+=d.amount; m[k].rows.push({date:d.date,type:'out',amount:d.amount,by:d.by,method:d.method}); });
  return Object.values(m).map(x=>{ x.remaining=x.given-x.paid; x.rows.sort((a,b)=>a.date<b.date?-1:1); return x; });
}
function debtorsWithBalance(){ return perPersonDebt().filter(x=>x.remaining>0.5).sort((a,b)=>b.remaining-a.remaining); }

  const amt=readAmt(document.getElementById('add_amt'));

  closeSheet(); pushOp('money',{safe,method,dir:'out',amount:amt,date,reason}); toast('Olindi ✓');
}

function regLookup(){
  const bc=document.getElementById('reg_bc').value.trim(); const dyn=document.getElementById('reg_dyn');
  const ex=ST.products.find(p=>p.barcode===bc);
  if(ex){ dyn.innerHTML=`<div class="banner">Mavjud: <b>${esc(ex.name)}</b> — hozir ${ex.qty} dona</div>
      <div class="field"><label>Qo'shiladigan soni</label>

        <button class="icon-btn" onclick="scanCount()">${I.scan}</button></div>
        <div class="scan-feed" id="reg_feed">Har skan = +1</div></div>`;
  } else if(bc){ dyn.innerHTML=`<div class="field"><label>Nomi</label><input class="inp" id="reg_name" placeholder="Mahsulot nomi"/></div>
      <div class="field"><label>Rasm</label><input type="file" accept="image/*" capture="environment" onchange="readPhoto(this)"/>
        <img id="reg_prev" style="margin-top:8px;max-height:110px;border-radius:10px;display:none"/></div>
      <div class="field"><label>Narx (${CONFIG.CURRENCY})</label>
        <input class="inp num" id="reg_price" inputmode="numeric" placeholder="0" oninput="fmtInput(this)"/></div>
      <div class="field"><label>Soni</label>
        <div class="row"><input class="inp num" id="reg_qty" inputmode="numeric" value="1"/>
        <button class="icon-btn" onclick="scanCount()">${I.scan}</button></div>
        <div class="scan-feed" id="reg_feed">Har skan = +1</div></div>`;
  } else dyn.innerHTML='';
}
function readPhoto(input){
  const f=input.files[0]; if(!f)return; const r=new FileReader();
  r.onload=e=>{ const img=new Image();
    img.onload=()=>{ const c=document.createElement('canvas'); const max=260;
      let w=img.width,h=img.height; const s=Math.min(1,max/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
      c.width=w;c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.6,data=c.toDataURL('image/jpeg',q);
      while(data.length>40000&&q>0.25){ q-=0.1; data=c.toDataURL('image/jpeg',q); }
      __photo=data; const pv=document.getElementById('reg_prev'); if(pv){pv.src=data;pv.style.display='block';} };
    img.src=e.target.result; };
  r.readAsDataURL(f);
}
function scanCount(){ openScanner('Skaner qiling — har skan +1',code=>{
    const el=document.getElementById('reg_qty'); if(!el)return; el.value=(parseInt(el.value||'0',10)||0)+1;
    const fb=document.getElementById('reg_feed'); if(fb)fb.textContent='✓ '+code+' (+1)'; },{keepOpen:true}); }
function doRegister(){
  const bc=document.getElementById('reg_bc').value.trim(); if(!bc){ toast('Shtrix-kod kiriting'); return; }
  const qEl=document.getElementById('reg_qty'); const qty=parseInt((qEl&&qEl.value)||'0',10)||0;
  if(qty<=0){ toast("Soni noto'g'ri"); return; }
  const ex=ST.products.find(p=>p.barcode===bc);
  if(!ex){ const nEl=document.getElementById('reg_name'); const name=(nEl&&nEl.value.trim())||'';
    if(!name){ toast('Nomini kiriting'); return; }
    const price=readAmt(document.getElementById('reg_price'));
    pushOp('prod_new',{barcode:bc,name,photo:__photo,price}); }
  closeSheet(); pushOp('stock_in',{barcode:bc,qty}); __photo=''; toast("Omborga qo'shildi ✓");
}

function sellHit(code){ const p=ST.products.find(x=>x.barcode===code); const fb=document.getElementById('sell_feed');
  if(p){ addToCart(p.barcode); if(fb)fb.textContent='✓ '+p.name; } else if(fb) fb.textContent='Topilmadi: '+code; }
function sellSearch(q){ q=q.trim().toLowerCase(); const box=document.getElementById('sell_sugg');
  if(q.length<3){ box.innerHTML=''; return; }
  const hits=ST.products.filter(p=>p.name.toLowerCase().includes(q)).slice(0,6);
  box.innerHTML=hits.length?hits.map(p=>`<button class="lrow" style="width:100%" onclick="addToCart('${esc(p.barcode)}')">
    <div class="thumb">${p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover"/>`:'—'}</div>
    <div class="meta"><div class="nm">${esc(p.name)}</div><div class="sub num">${money(p.price)} · ${p.qty} dona</div></div>
    <div class="qty">+</div></button>`).join(''):`<div class="empty">Topilmadi</div>`; }
function addToCart(bc){ const p=ST.products.find(x=>x.barcode===bc); if(!p)return;
  const l=CART.find(c=>c.barcode===bc); if(l)l.qty++; else CART.push({barcode:bc,name:p.name,qty:1,price:p.price});
  const s=document.getElementById('sell_search'); if(s)s.value=''; const g=document.getElementById('sell_sugg'); if(g)g.innerHTML='';
  renderCart(); }
function cartStep(bc,d){ const l=CART.find(c=>c.barcode===bc); if(!l)return;
  l.qty+=d; if(l.qty<=0)CART=CART.filter(c=>c.barcode!==bc); renderCart(); }
function renderCart(){ const el=document.getElementById('sell_cart'); if(!el)return;
  if(!CART.length){ el.innerHTML=`<div class="empty">Hali mahsulot qo'shilmadi</div>`; return; }
  let t=0; el.innerHTML=CART.map(c=>{ t+=c.qty*c.price; return `<div class="lrow">
    <div class="meta"><div class="nm">${esc(c.name)}</div>
      <div class="sub num">${money(c.price)} × ${c.qty} = ${money(c.price*c.qty)}</div></div>
    <div class="stepper"><button onclick="cartStep('${esc(c.barcode)}',-1)">−</button>
      <span class="n num">${c.qty}</span><button onclick="cartStep('${esc(c.barcode)}',1)">+</button></div></div>`;}).join('')
    +`<div class="kv"><span>Jami</span><b class="num">${money(t)} ${CONFIG.CURRENCY}</b></div>`; }
function doSell(){ if(!CART.length){ toast("Mahsulot qo'shing"); return; }
  for(const c of CART){ const p=ST.products.find(x=>x.barcode===c.barcode);
    if(!p||p.qty<c.qty){ toast('Omborda yetarli emas: '+c.name); return; } }
  const date=document.getElementById('sell_date').value||todayBiz();
  let total=0; CART.forEach(c=>total+=c.qty*c.price);
  closeSheet(); pushOp('sale',{date,method:PICK.sell,total,items:CART.map(c=>({...c}))});
  toast('Sotildi ✓ '+money(total)+' '+CONFIG.CURRENCY); }

let SCOUNT=[];
function openStock(){
  SCOUNT=[];
  sheet(`<h2>Inventarizatsiya</h2><p class="desc">Skaner qiling. Bir mahsulot 2 marta = +2. Oxirida kamomad ko'rsatiladi.</p>
    <div class="cam-wrap barcode" id="st_cam"><div class="cam-msg">Kamerani yoqish uchun tugma</div></div>
    <div class="scan-feed" id="st_feed"></div>
    <button class="plus-btn" style="width:100%;justify-content:center;margin-bottom:8px"
      onclick="startCamera(document.getElementById('st_cam'),stockHit)">${I.scan} Kamerani yoqish</button>
    <div class="row" style="margin-bottom:8px"><input class="inp" id="st_manual" placeholder="qo'lda shtrix-kod" inputmode="numeric"/>
      <button class="icon-btn" onclick="stockManual()">${I.plus}</button></div>
    <div class="list" id="st_list"></div>
    <div class="actions"><button class="btn ghost" onclick="closeSheet()">Bekor</button>
      <button class="btn" onclick="stockFinish()">Yakunlash</button></div>`);
  renderStock();
}
function stockManual(){ const el=document.getElementById('st_manual'); const v=el.value.trim(); if(v){ stockHit(v); el.value=''; } }
function stockHit(code){ const p=ST.products.find(x=>x.barcode===code); const fb=document.getElementById('st_feed');
  if(!p){ if(fb)fb.textContent='Topilmadi: '+code; return; }
  const l=SCOUNT.find(x=>x.barcode===code); if(l)l.counted++; else SCOUNT.push({barcode:code,name:p.name,counted:1,price:p.price,sys:p.qty});
  if(fb)fb.textContent='✓ '+p.name+' (+1)'; renderStock(); }
function stockStep(bc,d){ const l=SCOUNT.find(x=>x.barcode===bc); if(!l)return; l.counted+=d; if(l.counted<=0)SCOUNT=SCOUNT.filter(x=>x.barcode!==bc); renderStock(); }
function renderStock(){ const el=document.getElementById('st_list'); if(!el)return;
  el.innerHTML=SCOUNT.length?SCOUNT.map(l=>`<div class="lrow">
    <div class="meta"><div class="nm">${esc(l.name)}</div><div class="sub num">Tizimda: ${l.sys}</div></div>
    <div class="stepper"><button onclick="stockStep('${esc(l.barcode)}',-1)">−</button>
      <span class="n num">${l.counted}</span><button onclick="stockStep('${esc(l.barcode)}',1)">+</button></div></div>`).join('')
    :`<div class="empty">Skaner qiling</div>`; }
function stockFinish(){
  const counted=SCOUNT.slice();
  const diffs=ST.products.map(p=>{ const c=counted.find(x=>x.barcode===p.barcode); const cn=c?c.counted:0;
    return {barcode:p.barcode,name:p.name,sys:p.qty,counted:cn,diff:p.qty-cn,price:p.price}; }).filter(d=>d.diff!==0);
  let lost=0; diffs.forEach(d=>{ if(d.diff>0)lost+=d.diff*d.price; });
  const rows=diffs.length?diffs.map(d=>`<div class="kv"><span>${esc(d.name)}<br>
      <small style="color:var(--faint)">tizim ${d.sys} · sanoq ${d.counted}</small></span>
      <b class="num" style="color:${d.diff>0?'var(--danger)':'var(--ok)'}">
      ${d.diff>0?'−'+d.diff+' dona · '+money(d.diff*d.price):'+'+(-d.diff)+' dona'}</b></div>`).join('')
      +`<div class="kv" style="margin-top:6px"><span><b>Kamomad qiymati</b></span>
        <b class="num" style="color:var(--danger)">${money(lost)} ${CONFIG.CURRENCY}</b></div>`
    :`<div class="empty" style="color:var(--ok)">Kamomad yo'q ✓</div>`;
  window.__counted=counted;
  sheet(`<h2>Natija</h2><p class="desc">Tizim − sanoq.</p>${rows}
    <div class="actions"><button class="btn ghost" onclick="closeSheet()">Yopish</button>
      <button class="btn" onclick="stockApply()">Omborni to'g'irlash</button></div>`);
}
function stockApply(){ const counts=(window.__counted||[]).map(c=>({barcode:c.barcode,qty:c.counted}));
  if(!counts.length){ closeSheet(); return; } closeSheet(); pushOp('stock_set',{counts}); toast('Ombor yangilandi ✓'); }

/* --- PDF yordamchilari --- */
function newDoc(){ const {jsPDF}=window.jspdf; return new jsPDF({unit:'mm',format:'a4'}); }
function pdfCtx(doc){ return {doc,y:0}; }
function pHeader(c,title,sub){ c.doc.setFont(undefined,'bold').setFontSize(16); c.doc.text(title,14,18);
  c.doc.setFont(undefined,'normal').setFontSize(10).setTextColor(120); c.doc.text(sub,14,24.5); c.doc.setTextColor(0); c.y=32; }
function pBreak(c,need){ if(c.y+(need||6)>288){ c.doc.addPage(); c.y=18; } }
function pSection(c,t){ pBreak(c,12); c.y+=2; c.doc.setFont(undefined,'bold').setFontSize(11); c.doc.text(t,14,c.y); c.y+=2;
  c.doc.setDrawColor(210); c.doc.line(14,c.y,196,c.y); c.y+=5; c.doc.setFont(undefined,'normal'); }
function pRow(c,cols,vals,bold){
  pBreak(c,6); c.doc.setFont(undefined,bold?'bold':'normal').setFontSize(9);
  cols.forEach((col,i)=>{ let v=String(vals[i]??''); const align=col.a==='r'?'right':'left';
    if(col.w){ /* truncate */ while(v.length>3&&c.doc.getTextWidth(v)>col.w){ v=v.slice(0,-2); } }
    c.doc.text(v,col.x,c.y,{align}); });
  c.y+=5;
}
function pTotal(c,label,val){ pBreak(c,6); c.doc.setFont(undefined,'bold').setFontSize(10);
  c.doc.text(label,14,c.y); c.doc.text(money(val)+' '+CONFIG.CURRENCY,196,c.y,{align:'right'}); c.y+=6; c.doc.setFont(undefined,'normal'); }

function reportDaily(){
  const day=document.getElementById('r_day').value; if(!day)return;
  const c=pdfCtx(newDoc()); pHeader(c,"Kunlik hisobot (batafsil)",prettyDate(day));
  const inRows=ST.ledger.filter(e=>e.date===day&&e.dir==='in');
  const outRows=ST.ledger.filter(e=>e.date===day&&e.dir==='out');
  const dg=ST.debtGiven.filter(d=>d.date===day);
  const dp=ST.debtPaid.filter(d=>d.date===day);
  const usul=m=>m==='cash'?'Naqd':m==='card'?'Karta':m;
  const joy=s=>s==='PC'?'PC':'Bar';

  const colsIn=[{x:14,w:26},{x:44,w:16},{x:66,w:24},{x:96,w:60},{x:196,a:'r'}];
  pSection(c,"Kirim — qo'shilgan pul");
  pRow(c,colsIn,['Kim','Joy','Usul','Kategoriya','Summa'],true);
  let tin=0; inRows.forEach(e=>{ tin+=e.amount; pRow(c,colsIn,[e.by,joy(e.safe),usul(e.method),e.reason||'Kirim',money(e.amount)]); });
  if(!inRows.length) pRow(c,colsIn,['—','','','','0']);
  pTotal(c,'Jami kirim',tin);

  pSection(c,"Chiqim — olingan pul");
  pRow(c,colsIn,['Kim','Joy','Usul','Sabab','Summa'],true);
  let tout=0; outRows.forEach(e=>{ tout+=e.amount; pRow(c,colsIn,[e.by,joy(e.safe),usul(e.method),e.reason||'—',money(e.amount)]); });
  if(!outRows.length) pRow(c,colsIn,['—','','','','0']);
  pTotal(c,'Jami chiqim',tout);

  const colsDG=[{x:14,w:40},{x:70,w:70},{x:196,a:'r'}];
  pSection(c,"Qarz berilgan");
  pRow(c,colsDG,['Kim (kassir)','Qarzdor','Summa'],true);
  let tdg=0; dg.forEach(d=>{ tdg+=d.amount; pRow(c,colsDG,[d.by,d.name||"Noma'lum",money(d.amount)]); });
  if(!dg.length) pRow(c,colsDG,['—','','0']);
  pTotal(c,'Jami qarz berilgan',tdg);

  const colsDP=[{x:14,w:34},{x:56,w:44},{x:106,w:24},{x:196,a:'r'}];
  pSection(c,"Qarz to'langan");
  pRow(c,colsDP,['Kim (kassir)','Qarzdor','Usul','Summa'],true);
  let tdp=0; dp.forEach(d=>{ tdp+=d.amount; pRow(c,colsDP,[d.by,d.name||"Noma'lum",usul(d.method),money(d.amount)]); });
  if(!dp.length) pRow(c,colsDP,['—','','','0']);
  pTotal(c,"Jami qarz to'langan",tdp);

  c.doc.save('hisobot_kunlik_'+day+'.pdf'); toast('PDF yuklandi ✓');
}

function reportMonthly(){
  const m=document.getElementById('r_month').value; if(!m)return;
  const [yy,mm]=m.split('-');
  const c=pdfCtx(newDoc()); pHeader(c,"Oylik hisobot",MONTHS_UZ[+mm-1]+' '+yy);

  // kunlik jamlar
  const days={};
  const D=k=>days[k]=days[k]||{cash:0,card:0,debt:0,out:0};
  ST.ledger.forEach(e=>{ if(!e.date.startsWith(m))return; const d=D(e.date);
    if(e.dir==='out') d.out+=e.amount; else if(e.method==='cash') d.cash+=e.amount; else d.card+=e.amount; });
  ST.debtGiven.forEach(x=>{ if(x.date.startsWith(m)) D(x.date).debt+=x.amount; });
  const dayKeys=Object.keys(days).sort();

  const cols=[{x:14},{x:66,a:'r'},{x:100,a:'r'},{x:130,a:'r'},{x:162,a:'r'},{x:196,a:'r'}];
  pSection(c,"Kunlar bo'yicha");
  pRow(c,cols,['Kun','Naqd','Karta','Qarz','Chiqim','Sof'],true);
  let sc=0,sk=0,sd=0,so=0;
  dayKeys.forEach(k=>{ const d=days[k]; sc+=d.cash;sk+=d.card;sd+=d.debt;so+=d.out;
    pRow(c,cols,[prettyDate(k),money(d.cash),money(d.card),money(d.debt),money(d.out),money(d.cash+d.card+d.debt-d.out)]); });
  if(!dayKeys.length) pRow(c,cols,['—','0','0','0','0','0']);
  pRow(c,cols,['JAMI',money(sc),money(sk),money(sd),money(so),money(sc+sk+sd-so)],true);

  // kategoriya bo'yicha chiqim
  const spend={};
  ST.ledger.forEach(e=>{ if(e.date.startsWith(m)&&e.dir==='out'){ const k=e.reason||'Boshqa'; spend[k]=(spend[k]||0)+e.amount; } });
  const colsC=[{x:14,w:120},{x:196,a:'r'}];
  pSection(c,"Chiqim — kategoriyalar bo'yicha");
  pRow(c,colsC,['Kategoriya','Summa'],true);
  const sk2=Object.keys(spend).sort((a,b)=>spend[b]-spend[a]);
  sk2.forEach(k=>pRow(c,colsC,[k,money(spend[k])]));
  if(!sk2.length) pRow(c,colsC,['—','0']);

  // kirim manbalari
  const src={PC:0,'Bar sotuv':0,"Qarz to'lovi":0};
  ST.ledger.forEach(e=>{ if(!e.date.startsWith(m)||e.dir!=='in')return;
    if(e.reason==='Sotuv') src['Bar sotuv']+=e.amount; else if(e.reason==="Qarz to'lovi") src["Qarz to'lovi"]+=e.amount; else src.PC+=e.amount; });
  let dgm=0; ST.debtGiven.forEach(x=>{ if(x.date.startsWith(m)) dgm+=x.amount; });
  pSection(c,"Kirim manbalari");
  pRow(c,colsC,['Manba','Summa'],true);
  pRow(c,colsC,['PC (naqd/karta)',money(src.PC)]);
  pRow(c,colsC,['Bar sotuv',money(src['Bar sotuv'])]);
  pRow(c,colsC,["Qarz to'lovi",money(src["Qarz to'lovi"])]);
  pRow(c,colsC,['Qarzga berilgan',money(dgm)]);

  c.doc.save('hisobot_oylik_'+m+'.pdf'); toast('PDF yuklandi ✓');
}

function reportDebt(){
  const c=pdfCtx(newDoc()); pHeader(c,"Qarz hisoboti",prettyDate(todayBiz()));
  const people=perPersonDebt();
  let tg=0,tp=0; people.forEach(p=>{ tg+=p.given; tp+=p.paid; });

}

/* =====================================================================
   KAMERA / SKANER  (tovush + tebranish, aniq bir skan = bir dona)
   ===================================================================== */
let __stream=null, __AC=null;
function beep(){ try{ __AC=__AC||new (window.AudioContext||window.webkitAudioContext)();
  if(__AC.state==='suspended') __AC.resume();
  const o=__AC.createOscillator(), g=__AC.createGain(); o.frequency.value=880; o.type='square';
  o.connect(g); g.connect(__AC.destination);
  const t=__AC.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.35,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.13); o.start(t); o.stop(t+0.14);
}catch(e){} }
function feedback(){ beep(); try{ if(navigator.vibrate) navigator.vibrate(70); }catch(e){} }

async function startCamera(host,onCode){
  stopCamera(); if(!host)return;
  if(!('BarcodeDetector' in window)){
    host.innerHTML=`<div class="cam-msg">Bu brauzer avtomatik skanerni qo'llamaydi.<br>
      Nomidan qidiring yoki shtrix-kodni qo'lda kiriting.<br><small>(Android Chrome tavsiya etiladi)</small></div>`; return; }
  try{
    __stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    host.innerHTML=`<video autoplay playsinline muted></video><div class="cam-guide"></div>`;
    const v=host.querySelector('video'); v.srcObject=__stream; await v.play();
    const det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','code_93','codabar','itf']});
    let accepted=null, gap=0, lastAccept=0;
    const loop=async()=>{
      if(!__stream) return;
      try{
        const codes=await det.detect(v);
        if(codes.length){
          const val=codes[0].rawValue, now=Date.now();
          // yangi ko'rsatish: kod o'zgargan yoki kadrdan chiqib qaytgan bo'lsa VA kamida 400ms o'tgan bo'lsa
          if(val!==accepted && now-lastAccept>400){
            accepted=val; lastAccept=now; feedback(); onCode(val);
          }
          gap=0;
        } else {
          if(!gap) gap=Date.now();
          if(Date.now()-gap>350) accepted=null;   // shtrix-kod kadrdan chiqdi -> keyingisiga tayyor
        }
      }catch(e){}
      requestAnimationFrame(loop);
    };
    loop();
  }catch(e){ host.innerHTML=`<div class="cam-msg">Kameraga ruxsat berilmadi.<br>Nomidan qidiring yoki qo'lda kiriting.</div>`; }
}
function stopCamera(){ if(__stream){ __stream.getTracks().forEach(t=>t.stop()); __stream=null; } }

function openScanner(label,onCode,opts={}){
  const d=document.createElement('div');
  d.innerHTML=`<div class="scrim" id="scanScrim"><div class="sheet"><div class="grab"></div>
    <h2>${label}</h2>
    <div class="cam-wrap barcode" id="sc_host"><div class="cam-msg">Kamera yuklanmoqda...</div></div>
    <div class="scan-feed" id="sc_feed"></div>
    <div class="row"><input class="inp" id="sc_manual" placeholder="qo'lda shtrix-kod" inputmode="numeric"/>
      <button class="icon-btn" onclick="scManual()">${I.plus}</button></div>
    <div class="actions"><button class="btn" onclick="closeScanner()">Tayyor</button></div></div></div>`;
  document.body.appendChild(d.firstElementChild);
  window.__scCb=onCode;
  startCamera(document.getElementById('sc_host'),code=>{
    const fb=document.getElementById('sc_feed'); if(fb)fb.textContent='✓ '+code; onCode(code); if(!opts.keepOpen) closeScanner(); });
}
function scManual(){ const el=document.getElementById('sc_manual'); const v=el.value.trim(); if(v&&window.__scCb){ feedback(); window.__scCb(v); el.value=''; } }
function closeScanner(){ stopCamera(); const s=document.getElementById('scanScrim'); if(s)s.remove(); }
function scanInto(id){ openScanner('Shtrix-kodni skaner qiling',code=>{ const el=document.getElementById(id); if(el){ el.value=code; regLookup(); } }); }

/* =====================================================================
   UI yordamchi
   ===================================================================== */
function sheet(inner){ closeSheet(); const d=document.createElement('div');
  d.innerHTML=`<div class="scrim" id="scrim" onclick="if(event.target===this)closeSheet()">
    <div class="sheet"><div class="grab"></div>${inner}</div></div>`;
  document.body.appendChild(d.firstElementChild); }
function closeSheet(){ stopCamera(); const s=document.getElementById('scrim'); if(s)s.remove(); }
let tT=null;
function toast(m){ const o=document.getElementById('toast'); if(o)o.remove();
  const e=document.createElement('div'); e.id='toast'; e.className='toast'; e.textContent=m;
  document.body.appendChild(e); clearTimeout(tT); tT=setTimeout(()=>e.remove(),1900); }
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function dl(b,n){ const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=n; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); }

/* ---------- ANDROID (PWA) ---------- */
let INSTALL_EVT=null;
const installed=()=>window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); INSTALL_EVT=e; refreshInstallBtns(); });
window.addEventListener('appinstalled',()=>{ INSTALL_EVT=null; refreshInstallBtns(); toast("Ilova o'rnatildi ✓"); });
const ICON_DL=`<svg viewBox="0 0 24 24"><path d="M12 3v12M7 11l5 5 5-5M4 20h16"/></svg>`;
function installBtnHTML(){ if(installed()||!INSTALL_EVT) return '';
  return `<button class="install" id="installbtn" onclick="doInstall()">${ICON_DL}
    <span>Ilovani o'rnatish<small>Telefon ekraniga qo'shiladi — brauzersiz ochiladi</small></span></button>`; }
function refreshInstallBtns(){ document.querySelectorAll('[data-install]').forEach(h=>h.innerHTML=installBtnHTML()); }
async function doInstall(){ if(!INSTALL_EVT){ toast("Brauzer menyusidan \"Ekranga qo'shish\"ni tanlang"); return; }
  INSTALL_EVT.prompt(); await INSTALL_EVT.userChoice; INSTALL_EVT=null; refreshInstallBtns(); }
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }

/* ---------- login ---------- */
function renderLogin(){
  app.innerHTML=`<div id="login"><img class="logo" src="logo.png" alt="Aura"/><div class="brand">Aura<span>.</span></div>
    <p class="sub">O'yin klubi — pul nazorati</p>
    <div class="field"><label>Login</label><input id="li_user" placeholder="admin" autocapitalize="off"/></div>
    <div class="field"><label>Parol</label><input id="li_pass" type="password" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="err" id="li_err"></div>
    <button class="btn block" onclick="doLogin()">Kirish</button>
    <div data-install>${installBtnHTML()}</div>
    <p class="money-note">Boshlang'ich: <b>admin</b> / <b>admin</b></p></div>`;
}
function doLogin(){ const u=document.getElementById('li_user').value.trim(); const p=document.getElementById('li_pass').value;
  const f=ST.users.find(x=>x.username===u&&x.password===p);
  if(!f){ document.getElementById('li_err').textContent='Login yoki parol xato'; return; }
  CURRENT=f; LS.set('kassa_session',u); TAB='PC'; render(); sync(); }
function logout(){ CURRENT=null; LS.set('kassa_session',''); render(); }

/* ---------- ishga tushirish ---------- */
async function boot(){
  const t=new URLSearchParams(location.search).get('tab');
  if(['PC','BAR','SET'].includes(t)) TAB=t;
  rebuild(); restoreSession(); render();
  if(online()){ await sync(); rebuild(); restoreSession(); render(); }
}
boot();
</script>
